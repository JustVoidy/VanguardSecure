services:
  # ── Main FastAPI backend ─────────────────────────────────────────────────────
  - type: web
    name: netshield-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: netshield-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: REDIS_URL
        fromService:
          name: netshield-redis
          type: redis
          property: connectionString
      - key: ENV
        value: production

  # ── Redis (event store) ──────────────────────────────────────────────────────
  - type: redis
    name: netshield-redis
    plan: free
    ipAllowList: []

databases:
  - name: netshield-db
    plan: free
