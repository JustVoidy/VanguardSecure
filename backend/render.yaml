services:
  # ── Main FastAPI backend ─────────────────────────────────────────────────────
  - type: web
    name: netshield-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: netshield-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: ENV
        value: production

  # ── Inference server (model) ─────────────────────────────────────────────────
  - type: web
    name: netshield-inference
    runtime: python
    rootDir: backend
    buildCommand: pip install fastapi uvicorn tensorflow scikit-learn joblib numpy pydantic
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production

databases:
  - name: netshield-db
    plan: free
